name: seeu
description: SeeU - Social Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.2

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Camera
  camera: ^0.11.0+2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  chewie: ^1.8.5
  visibility_detector: ^0.4.0+2
  just_audio: ^0.9.42
  record: ^5.1.2

  # NOTE: google_mlkit_face_detection временно убран — он тянет
  # google_mlkit_commons, который требует iOS 15.5+ как min-deployment.
  # Podfile сейчас на iOS 13.0; поднимать = риск сломать другие pod'ы.
  # Маски остаются работать в static-heuristic режиме (mask_catalog.dart
  # → _FaceFrame.fromSize fallback). Когда будет Apple Dev-аккаунт и
  # стабильная сборка с iOS 15.5+ — раскомментируем и подключим в service.
  photo_view: ^0.14.0

  # UI
  shimmer: ^3.0.0
  timeago: ^3.6.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_staggered_animations: ^1.1.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  mime: ^1.0.5
  path: ^1.9.0
  http_parser: ^4.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FF5A3C"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
