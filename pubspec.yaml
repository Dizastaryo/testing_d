name: seeu
description: SeeU - Social Network
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.2

  # Navigation
  go_router: ^17.2.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Network
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Camera
  camera: ^0.11.0+2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  chewie: ^1.8.5
  visibility_detector: ^0.4.0+2
  # ScrollablePositionedList — для scroll-to-message-by-index в chat
  # (CHAT-3.1: tap на результат поиска прокручивает чат к этому сообщению).
  # ListView.builder не умеет «прыгнуть к индексу N» без known item-heights.
  scrollable_positioned_list: ^0.3.8
  just_audio: ^0.9.46
  # BUG-2: audio_session нужен для ringtone на iOS — без category .playback
  # звук режется во время silent-mode (mute switch). Android — category
  # routes ring через speaker даже при подключённых наушниках.
  audio_session: ^0.1.21
  # record 6.x синхронизирует federated реализации (record_linux 1.3+ есть
  # startStream + hasPermission(request:) от record_platform_interface 1.5).
  # 5.x всё ещё тянет старый record_linux 0.7.2 → build fail на iOS-actions
  # из-за несовпадения сигнатур.
  record: ^6.0.0

  # WebRTC для video/voice calls 1-1. Signaling через наш WS hub
  # (call.invite/offer/answer/ice/end), STUN — публичный Google.
  flutter_webrtc: ^1.4.1
  photo_view: ^0.14.0

  # UI
  shimmer: ^3.0.0
  timeago: ^3.6.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_staggered_animations: ^1.1.1

  # Geolocation — определение города для экрана Сборов
  geolocator: ^13.0.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  mime: ^1.0.5
  path: ^1.9.0
  http_parser: ^4.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  web_socket_channel: ^3.0.1
  # LIB-1: inline PDF preview в library (тап на PDF → bottom-sheet с
  # scrollable страницами вместо download). Native iOS PDFKit + Android
  # PDFViewer. На web не работает — fall back на url_launcher.
  flutter_pdfview: ^1.3.2
  # Temp-dir для cache PDF перед PDFView.fromPath. Уже транзитивно есть у
  # многих пакетов, но указываем явно чтобы import был чистый.
  path_provider: ^2.1.4
  # LIB Sprint 6: Tier-1 ридеры
  flutter_markdown: ^0.7.7   # TXT/MD reader
  vocsy_epub_viewer: ^3.0.0  # EPUB reader (wraps native FolioReader/R2)
  mediapipe_face_mesh: ^1.6.0
  lottie: ^3.3.0
  video_thumbnail: ^0.5.3
  emoji_picker_flutter: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.9
  riverpod_generator: ^2.6.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FF5A3C"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    # C-3.1: ringtone/ringback/endtone (programmatically generated sine-WAVs
    # — CC0 by construction, see assets/sounds/generate_tones.py).
    - assets/sounds/
    - assets/masks/
